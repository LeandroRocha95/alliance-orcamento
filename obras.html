<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alliance — Obras</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0e14;--surface:#13161f;--surface2:#1a1e2b;--surface3:#222638;--border:#2d3348;--accent:#308EEE;--accent2:#1A65B8;--green:#2ecc71;--red:#e74c3c;--yellow:#f5a623;--purple:#a855f7;--text:#e8eaf0;--muted:#7a7f9a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:12px;height:54px;position:sticky;top:0;z-index:50;}
.header-logo{height:28px;background:#fff;border-radius:6px;padding:3px 8px;}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;}
.badge{background:rgba(48,142,238,.15);border:1px solid rgba(48,142,238,.3);color:var(--accent);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:20px;}
.hr{margin-left:auto;display:flex;gap:8px;align-items:center;}
.btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:5px 12px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;text-decoration:none;display:flex;align-items:center;gap:5px;transition:all .15s;cursor:pointer;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn.pri{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn.pri:hover{opacity:.85;}
.main{max-width:1300px;margin:0 auto;padding:20px;}
.filtros{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.fl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-right:2px;}
.fb{background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:5px 11px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;transition:all .15s;}
.fb:hover{border-color:var(--accent);color:var(--accent);}
.fb.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.sep{width:1px;height:18px;background:var(--border);margin:0 4px;}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 15px;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0;}
.kpi.k1::before{background:var(--accent);}
.kpi.k2::before{background:var(--yellow);}
.kpi.k3::before{background:var(--green);}
.kpi.k4::before{background:var(--red);}
.kpi.k5::before{background:var(--purple);}
.kpi-lb{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.kpi-v{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;line-height:1;margin-bottom:2px;}
.kpi.k1 .kpi-v{color:var(--accent);}
.kpi.k2 .kpi-v{color:var(--yellow);}
.kpi.k3 .kpi-v{color:var(--green);}
.kpi.k4 .kpi-v{color:var(--red);}
.kpi.k5 .kpi-v{color:var(--purple);}
.kpi-s{font-size:10px;color:var(--muted);}
.cfg-panel{background:var(--surface);border:1px solid var(--accent);border-radius:12px;padding:18px;margin-bottom:18px;display:none;}
.cfg-panel.open{display:block;}
.cfg-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;margin-bottom:3px;}
.cfg-sub{font-size:11px;color:var(--muted);margin-bottom:14px;}
.cfg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:7px;margin-bottom:14px;}
.ci{display:flex;align-items:center;gap:7px;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;cursor:grab;user-select:none;transition:border-color .15s;}
.ci:hover{border-color:rgba(48,142,238,.4);}
.ci.on{border-color:var(--accent);background:rgba(48,142,238,.07);}
.ci.drag{opacity:.35;}
.ci-h{color:var(--muted);font-size:13px;}
.ci-cb{width:15px;height:15px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;}
.ci-n{font-size:11px;font-weight:600;flex:1;}
.ci-t{font-size:10px;color:var(--muted);}
.cfg-acts{display:flex;gap:7px;}
.obras-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.obras-tit{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;}
.srch{position:relative;}
.srch-inp{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 11px 6px 28px;font-family:'DM Sans',sans-serif;font-size:11px;width:180px;outline:none;transition:border-color .15s;}
.srch-inp:focus{border-color:var(--accent);}
.srch-ico{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;pointer-events:none;}
.grupo{margin-bottom:14px;}
.gh{display:flex;align-items:center;gap:9px;padding:8px 13px;background:var(--surface2);border-radius:10px 10px 0 0;border:1px solid var(--border);border-bottom:none;cursor:pointer;user-select:none;}
.gdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.gnom{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1.5px;}
.gcnt{font-size:11px;color:var(--muted);margin-left:auto;}
.gcv{color:var(--muted);transition:transform .2s;font-size:12px;}
.grupo.col .gcv{transform:rotate(-90deg);}
.grupo.col .gb{display:none;}
.gb{border:1px solid var(--border);border-radius:0 0 10px 10px;overflow:auto;}
table{width:100%;border-collapse:collapse;min-width:500px;}
th{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:8px 11px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface);white-space:nowrap;}
td{padding:10px 11px;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(48,142,238,.03);}
.on-b{font-weight:700;font-size:12px;}
.sub-info{font-size:10px;color:var(--muted);margin-top:2px;}
.sb{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;}
.pw{display:flex;align-items:center;gap:5px;}
.pb{flex:1;height:6px;background:var(--surface3);border-radius:3px;min-width:60px;}
.pf{height:100%;border-radius:3px;}
.pp{font-size:11px;font-weight:700;color:var(--muted);width:32px;text-align:right;flex-shrink:0;}
.dok{color:var(--green);}
.dat{color:var(--red);}
.dne{color:var(--muted);}
.loading{text-align:center;padding:50px;color:var(--muted);}
.spin{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:30px;color:var(--muted);font-size:12px;}
.upd{font-size:10px;color:var(--muted);text-align:right;margin-top:10px;opacity:.6;}
.err-box{background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.25);border-radius:10px;padding:20px 24px;color:var(--red);font-size:12px;}
.err-box code{display:block;margin-top:8px;font-family:monospace;font-size:11px;color:var(--muted);word-break:break-all;}
</style>
</head>
<body>
<header class="header">
  <img class="header-logo" src="https://leandrorocha95.github.io/alliance-orcamento/logo_alliance.jpg" alt="Alliance">
  <div class="header-title">Gestão de Obras</div>
  <div class="badge">Monday.com</div>
  <div class="hr">
    <button class="btn" onclick="toggleCfg()">⚙️ Colunas</button>
    <button class="btn pri" onclick="carregar()">↻ Atualizar</button>
    <a href="hub.html" class="btn">← Hub</a>
  </div>
</header>
<div class="main">
  <div class="filtros">
    <span class="fl">Loja:</span>
    <button class="fb on" onclick="setF('loja','todas',this)">Todas</button>
    <button class="fb" onclick="setF('loja','JOI',this)">Joinville</button>
    <button class="fb" onclick="setF('loja','TIJ',this)">Tijucas</button>
    <button class="fb" onclick="setF('loja','GUA',this)">Guaramirim</button>
    <div class="sep"></div>
    <span class="fl">Status:</span>
    <button class="fb on" onclick="setF('status','todos',this)">Todos</button>
    <button class="fb" onclick="setF('status','andamento',this)">Em andamento</button>
    <button class="fb" onclick="setF('status','concluido',this)">Concluídos</button>
    <button class="fb" onclick="setF('status','atrasado',this)">Atrasados</button>
  </div>
  <div class="kpi-grid">
    <div class="kpi k1"><div class="kpi-lb">Total</div><div class="kpi-v" id="kT">—</div><div class="kpi-s">obras</div></div>
    <div class="kpi k2"><div class="kpi-lb">Em Andamento</div><div class="kpi-v" id="kA">—</div><div class="kpi-s">ativas</div></div>
    <div class="kpi k3"><div class="kpi-lb">Concluídas</div><div class="kpi-v" id="kC">—</div><div class="kpi-s">finalizadas</div></div>
    <div class="kpi k4"><div class="kpi-lb">Atrasadas</div><div class="kpi-v" id="kAt">—</div><div class="kpi-s">vencidas</div></div>
    <div class="kpi k5"><div class="kpi-lb">m² Total</div><div class="kpi-v" id="kM">—</div><div class="kpi-s">em obras</div></div>
  </div>
  <div class="cfg-panel" id="cfgPanel">
    <div class="cfg-title">⚙️ Configurar Colunas</div>
    <div class="cfg-sub">Marque e arraste para reordenar. 📊 = Cronograma · 📋 = Contrato</div>
    <div class="cfg-grid" id="cfgCols"></div>
    <div class="cfg-acts">
      <button class="btn pri" onclick="salvarCfg()">💾 Salvar</button>
      <button class="btn" onclick="resetCfg()">↺ Padrão</button>
      <button class="btn" onclick="toggleCfg()">Fechar</button>
    </div>
  </div>
  <div class="obras-bar">
    <div class="obras-tit">📋 Contratos</div>
    <div class="srch"><span class="srch-ico">🔍</span><input class="srch-inp" id="srch" placeholder="Buscar..." oninput="renderObras()"></div>
  </div>
  <div id="obras-c"><div class="loading"><div class="spin"></div><div>Carregando obras...</div></div></div>
  <div class="upd" id="upd"></div>
</div>
<script>
const TOK='eyJhbGciOiJIUzI1NiJ9.eyJ0aWQiOjY0MTU5OTM4OCwiYWFpIjoxMSwidWlkIjo3MDQwMzEzOCwiaWFkIjoiMjAyNi0wNC0wNFQxNjo0MjoyMC4xMzVaIiwicGVyIjoibWU6d3JpdGUiLCJhY3RpZCI6MjczMDA5MDAsInJnbiI6InVzZTEifQ.-y8koB2eNV4woMPAwacSw1PRXpLdyRS5GSvxTVIq_aw';

const BOARD_CONTRATOS='8182483753';
const GRUPOS_CONTRATOS={
  'new_group29179':{nome:'Joinville', loja:'JOI',cor:'#308EEE'},
  'new_group43041':{nome:'Tijucas',   loja:'TIJ',cor:'#2ecc71'},
  'group_mkxtr89x':{nome:'Guaramirim',loja:'GUA',cor:'#f5a623'}
};
const BOARDS_CRON={JOI:'8189168336',TIJ:'9465760121',GUA:'18383178942'};
const GRUPOS_EXCLUIR=['group_mm1m6f7z','group_mm196hr2','group_mm08zqec'];
const CFG_KEY='alliance_obras_v5';

const COLS=[
  {id:'nome',          label:'Obra / Cliente',     src:'c', vis:true, ord:0},
  {id:'local',         label:'Local da Obra',       src:'c', vis:true, ord:1},
  {id:'status',        label:'Status da Obra',      src:'k', vis:true, ord:2},
  {id:'progresso',     label:'Progresso',           src:'k', vis:true, ord:3},
  {id:'prazo',         label:'Prazo',               src:'k', vis:true, ord:4},
  {id:'entrega',       label:'Data de Entrega',     src:'k', vis:true, ord:5},
  {id:'encarregado',   label:'Encarregado',         src:'k', vis:true, ord:6},
  {id:'vendedor',      label:'Vendedor',            src:'c', vis:true, ord:7},
  {id:'m2',            label:'m² Total',            src:'c', vis:true, ord:8},
  {id:'data_venda',    label:'Data Venda',          src:'c', vis:false,ord:9},
  {id:'regularizacao', label:'C/ Regularização',    src:'c', vis:false,ord:10},
  {id:'estrutura',     label:'Estrutura',           src:'c', vis:false,ord:11},
  {id:'paredes',       label:'Paredes',             src:'c', vis:false,ord:12},
  {id:'forro',         label:'Forro',               src:'c', vis:false,ord:13},
  {id:'ceramica_mat',  label:'Cerâmica (material)', src:'c', vis:false,ord:14},
  {id:'telha',         label:'Telha',               src:'c', vis:false,ord:15},
  {id:'pgto',          label:'Pgto do Cliente',     src:'c', vis:false,ord:16},
];

var _cfg=loadCfg(),_itens=[],_fLoja='todas',_fStatus='todos',_drag=null;

function loadCfg(){
  try{var s=localStorage.getItem(CFG_KEY);if(s)return JSON.parse(s);}catch(e){}
  return COLS.map(function(c){return{id:c.id,vis:c.vis,ord:c.ord};});
}
function saveCfg(){localStorage.setItem(CFG_KEY,JSON.stringify(_cfg));}
function resetCfg(){_cfg=COLS.map(function(c){return{id:c.id,vis:c.vis,ord:c.ord};});localStorage.removeItem(CFG_KEY);renderCfg();renderObras();}
function colsAtivas(){
  return _cfg.slice().sort(function(a,b){return a.ord-b.ord;})
    .filter(function(c){return c.vis;})
    .map(function(c){return COLS.find(function(t){return t.id===c.id;});})
    .filter(Boolean);
}
function toggleCfg(){var el=document.getElementById('cfgPanel');if(el.classList.toggle('open'))renderCfg();}
function renderCfg(){
  var ordered=_cfg.slice().sort(function(a,b){return a.ord-b.ord;});
  document.getElementById('cfgCols').innerHTML=ordered.map(function(cfg){
    var col=COLS.find(function(c){return c.id===cfg.id;});if(!col)return'';
    return'<div class="ci'+(cfg.vis?' on':'')+'" data-id="'+col.id+'" draggable="true"'
      +' ondragstart="dS(event)" ondragover="dO(event)" ondrop="dD(event)" ondragend="dE(event)">'
      +'<span class="ci-h">⠿</span>'
      +'<input type="checkbox" class="ci-cb"'+(cfg.vis?' checked':'')+' onchange="this.closest(\'.ci\').classList.toggle(\'on\',this.checked)">'
      +'<span class="ci-n">'+col.label+'</span>'
      +'<span class="ci-t">'+(col.src==='k'?'📊':'📋')+'</span></div>';
  }).join('');
}
function salvarCfg(){
  _cfg=Array.from(document.querySelectorAll('.ci')).map(function(el,i){
    return{id:el.dataset.id,vis:el.querySelector('.ci-cb').checked,ord:i};
  });
  saveCfg();toggleCfg();renderObras();
}
function dS(e){_drag=e.currentTarget;e.currentTarget.classList.add('drag');e.dataTransfer.effectAllowed='move';}
function dO(e){e.preventDefault();}
function dD(e){
  e.preventDefault();
  if(_drag&&_drag!==e.currentTarget){
    var p=e.currentTarget.parentNode,its=Array.from(p.children);
    if(its.indexOf(_drag)<its.indexOf(e.currentTarget))p.insertBefore(_drag,e.currentTarget.nextSibling);
    else p.insertBefore(_drag,e.currentTarget);
  }
}
function dE(e){e.currentTarget.classList.remove('drag');_drag=null;}

// ── Monday API ───────────────────────────────────────────────────────────────
async function mq(query){
  var r=await fetch('https://api.monday.com/v2',{
    method:'POST',
    headers:{'Authorization':TOK,'Content-Type':'application/json','API-Version':'2024-01'},
    body:JSON.stringify({query:query})
  });
  var j=await r.json();
  if(j.errors&&j.errors.length)throw new Error(j.errors.map(function(e){return e.message;}).join(' | '));
  return j;
}

function extractVal(col){
  if(!col)return'';
  if(col.label!=null&&col.label!=='')return col.label;
  if(col.values&&col.values.length)return col.values.map(function(x){return x.label||x.text||'';}).filter(Boolean).join(', ');
  if(col.display_value!=null&&col.display_value!=='')return col.display_value;
  return col.text||'';
}

async function carregar(){
  document.getElementById('obras-c').innerHTML='<div class="loading"><div class="spin"></div><div>Carregando obras...</div></div>';
  document.getElementById('upd').textContent='';
  try{
    var contratosQ=`{
      boards(ids:[${BOARD_CONTRATOS}]){
        groups(ids:${JSON.stringify(Object.keys(GRUPOS_CONTRATOS))}){
          id
          items_page(limit:200){
            items{
              id name
              column_values{
                id text
                ... on StatusValue{label}
                ... on DropdownValue{values{label}}
                ... on MirrorValue{display_value}
              }
            }
          }
        }
      }
    }`;

    var cronBoardIds=Object.values(BOARDS_CRON).join(',');
    var cronQ=`{
      boards(ids:[${cronBoardIds}]){
        id
        groups{
          id title
          items_page(limit:50){
            items{
              id name
              column_values{
                id text
                ... on StatusValue{label}
                ... on PeopleValue{text}
              }
            }
          }
        }
      }
    }`;

    var results=await Promise.all([mq(contratosQ),mq(cronQ)]);
    var contratosR=results[0], cronR=results[1];

    // Indexa contratos
    var contratosPorNome={};
    var board=contratosR.data.boards[0];
    if(!board)throw new Error('Board de contratos não encontrado');
    board.groups.forEach(function(g){
      var gInfo=GRUPOS_CONTRATOS[g.id];if(!gInfo)return;
      g.items_page.items.forEach(function(item){
        var obj={loja:gInfo.loja,_c:{}};
        item.column_values.forEach(function(col){obj._c[col.id]=extractVal(col);});
        contratosPorNome[norm(item.name)]=obj;
      });
    });

    // Mapa boardId → loja
    var boardLojaMap={};
    Object.keys(BOARDS_CRON).forEach(function(loja){boardLojaMap[String(BOARDS_CRON[loja])]=loja;});

    _itens=[];
    (cronR.data.boards||[]).forEach(function(cronBoard){
      var loja=boardLojaMap[String(cronBoard.id)];if(!loja)return;
      cronBoard.groups.forEach(function(grupo){
        if(GRUPOS_EXCLUIR.includes(grupo.id))return;
        if(/^\.?Template/i.test(grupo.title.trim()))return;

        var items=grupo.items_page.items;
        if(!items||!items.length)return;

        var itemPrincipal=items.find(function(it){return /^4\./i.test(it.name);})||items[0];
        if(!itemPrincipal)return;

        // Progresso: % de itens com status "conclu*"
        var comStatus=items.filter(function(it){
          return it.column_values.some(function(cv){return cv.id==='feito_mkm0ha0e'&&(cv.text||'');});
        });
        var concl=comStatus.filter(function(it){
          return it.column_values.some(function(cv){
            return cv.id==='feito_mkm0ha0e'&&(cv.text||'').toLowerCase().includes('conclu');
          });
        }).length;
        var progresso=comStatus.length>0?Math.round(concl/comStatus.length*100):0;

        function getCV(it,id){
          var col=it.column_values.find(function(c){return c.id===id;});
          return col?extractVal(col):'';
        }

        var status=getCV(itemPrincipal,'feito_mkm0ha0e');
        var encarregado=getCV(itemPrincipal,'pessoas_mkmcn7as');
        var prazoRaw=getCV(itemPrincipal,'cronograma_mkm99srh');
        var entregaRaw=getCV(itemPrincipal,'data_mkmpchmz');

        var prazo='',entrega='';
        if(prazoRaw){
          var pts=prazoRaw.split(' - ');
          prazo=fmtD(pts[0])+(pts[1]?' → '+fmtD(pts[1]):'');
          entrega=pts[1]?fmtD(pts[1]):fmtD(pts[0]);
        }
        if(entregaRaw){var fe=fmtD(entregaRaw);if(fe)entrega=fe;}

        var nomeObra=grupo.title;
        var nomeNorm=norm(nomeObra);
        var contrato=null;
        if(contratosPorNome[nomeNorm]){
          contrato=contratosPorNome[nomeNorm];
        } else {
          var base=nomeNorm.split('-')[0].trim();
          Object.keys(contratosPorNome).forEach(function(k){
            if(!contrato&&(nomeNorm.includes(k)||k.includes(base)&&base.length>3))
              contrato=contratosPorNome[k];
          });
        }
        if(contrato&&contrato.loja!==loja)contrato=null;

        function cv(id){return contrato?contrato._c[id]||''  :'';}

        _itens.push({
          id:itemPrincipal.id,
          nome:nomeObra,
          loja:loja,
          status:status,
          progresso:progresso,
          prazo:prazo,
          entrega:entrega,
          encarregado:encarregado,
          _c:{
            nome:nomeObra,
            status:status,
            progresso:String(progresso),
            prazo:prazo,
            entrega:entrega,
            encarregado:encarregado,
            vendedor:     cv('lista_suspensa_mkkzq8ff')||cv('dup__of_vendedor_mkmcjeft'),
            m2:           cv('n_meros_mkkze5hz'),
            local:        cv('texto_mkkznkyv'),
            data_venda:   fmtD(cv('data_mkmgvcak')),
            regularizacao:cv('dropdown_mm09adag'),
            estrutura:    cv('lista_suspensa_mkkz9qah'),
            paredes:      cv('lista_suspensa_mkkzzgzs'),
            forro:        cv('lista_suspensa_mkkzr4hj'),
            ceramica_mat: cv('lista_suspensa_mkkzm3vq'),
            telha:        cv('lista_suspensa_mkkzyky0'),
            pgto:         cv('pgto_cliente_mkkzfehp'),
          }
        });
      });
    });

    console.log('Obras carregadas:',_itens.length,_itens.slice(0,2));
    updKPIs();renderObras();
    document.getElementById('upd').textContent='Atualizado às '+new Date().toLocaleTimeString('pt-BR')+' ('+_itens.length+' obras)';
  }catch(e){
    console.error(e);
    document.getElementById('obras-c').innerHTML=
      '<div class="err-box">❌ Erro ao carregar dados do Monday.com<code>'+esc(e.message)+'</code><br><small style="color:var(--muted)">Abra o console (F12) para mais detalhes.</small></div>';
  }
}

function norm(s){return(s||'').toLowerCase().trim().replace(/\s+/g,' ');}
function fmtD(s){
  if(!s)return'';
  s=s.trim();
  var m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m?m[3]+'/'+m[2]+'/'+m[1]:s;
}
function gv(item,id){return(item._c&&item._c[id])||'';}

function isCon(i){var s=(i.status||'').toLowerCase();return s.includes('conclu')||s.includes('entregue')||s.includes('done');}
function isAtr(i){
  if(isCon(i))return false;
  var d=i.entrega;if(!d)return false;
  var p=d.split('/');return p.length===3&&new Date(+p[2],+p[1]-1,+p[0])<new Date();
}
function isAnd(i){return!isCon(i)&&!isAtr(i)&&i.status!=='';}

function cSt(s){
  var t=(s||'').toLowerCase();
  if(t.includes('conclu')||t.includes('entregue'))return{b:'rgba(46,204,113,.15)',c:'#2ecc71'};
  if(t.includes('atraso')||t.includes('parad'))   return{b:'rgba(231,76,60,.15)', c:'#e74c3c'};
  if(t.includes('andamento')||t.includes('execu'))return{b:'rgba(245,166,35,.15)',c:'#f5a623'};
  if(t.includes('espera')||t.includes('program')) return{b:'rgba(48,142,238,.15)',c:'#308EEE'};
  if(t.includes('iniciar'))                       return{b:'rgba(122,127,154,.1)', c:'#7a7f9a'};
  return{b:'rgba(168,85,247,.15)',c:'#a855f7'};
}
function cPr(p){return p>=80?'#2ecc71':p>=50?'#308EEE':p>=25?'#f5a623':'#e74c3c';}

function updKPIs(){
  var its=filtered();
  var m2=its.reduce(function(a,i){var v=parseFloat((gv(i,'m2')||'').replace(',','.'));return a+(isNaN(v)?0:v);},0);
  document.getElementById('kT').textContent=its.length;
  document.getElementById('kA').textContent=its.filter(isAnd).length;
  document.getElementById('kC').textContent=its.filter(isCon).length;
  document.getElementById('kAt').textContent=its.filter(isAtr).length;
  document.getElementById('kM').textContent=m2>0?m2.toLocaleString('pt-BR'):'—';
}

function filtered(){
  var b=(document.getElementById('srch')?document.getElementById('srch').value||'':'').toLowerCase();
  return _itens.filter(function(i){
    if(_fLoja!=='todas'&&i.loja!==_fLoja)return false;
    if(_fStatus==='andamento'&&!isAnd(i))return false;
    if(_fStatus==='concluido'&&!isCon(i))return false;
    if(_fStatus==='atrasado'&&!isAtr(i))return false;
    if(b&&!Object.values(i._c).join(' ').toLowerCase().includes(b))return false;
    return true;
  });
}

function setF(tipo,val,btn){
  if(tipo==='loja')_fLoja=val;
  if(tipo==='status')_fStatus=val;
  btn.parentElement.querySelectorAll('.fb').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  updKPIs();renderObras();
}

var LOJAS=[
  {id:'JOI',nome:'Joinville', cor:'#308EEE'},
  {id:'TIJ',nome:'Tijucas',   cor:'#2ecc71'},
  {id:'GUA',nome:'Guaramirim',cor:'#f5a623'}
];

function renderObras(){
  var its=filtered(),cols=colsAtivas(),c=document.getElementById('obras-c');
  if(!its.length){c.innerHTML='<div class="empty">Nenhuma obra encontrada.</div>';return;}
  var pg={JOI:[],TIJ:[],GUA:[]};
  its.forEach(function(i){if(pg[i.loja])pg[i.loja].push(i);});
  var html='';
  LOJAS.forEach(function(lj){
    var lst=pg[lj.id];if(!lst.length)return;
    html+='<div class="grupo" id="g-'+lj.id+'">';
    html+='<div class="gh" onclick="togG(\''+lj.id+'\')">';
    html+='<div class="gdot" style="background:'+lj.cor+'"></div>';
    html+='<div class="gnom">📍 '+lj.nome+'</div>';
    html+='<div class="gcnt">'+lst.length+' obra'+(lst.length!==1?'s':'')+'</div>';
    html+='<div class="gcv">▾</div></div>';
    html+='<div class="gb"><table><thead><tr>';
    cols.forEach(function(col){html+='<th>'+col.label+'</th>';});
    html+='</tr></thead><tbody>';
    lst.forEach(function(item){
      html+='<tr>';
      cols.forEach(function(col){html+='<td>'+rCell(item,col)+'</td>';});
      html+='</tr>';
    });
    html+='</tbody></table></div></div>';
  });
  c.innerHTML=html;
}

function rCell(item,col){
  var v=gv(item,col.id);
  if(col.id==='nome'){
    var loc=gv(item,'local');
    return'<span class="on-b">'+esc(v)+'</span>'+(loc?'<div class="sub-info">📍 '+esc(loc)+'</div>':'');
  }
  if(col.id==='status'){
    var st=cSt(v);
    return v?'<span class="sb" style="background:'+st.b+';color:'+st.c+'">'+esc(v)+'</span>':'<span style="color:var(--muted)">—</span>';
  }
  if(col.id==='progresso'){
    var p=parseInt(v)||0,cp=cPr(p);
    return'<div class="pw"><div class="pb"><div class="pf" style="width:'+p+'%;background:'+cp+'"></div></div><div class="pp">'+(p>0?p+'%':'—')+'</div></div>';
  }
  if(col.id==='entrega'){
    if(!v)return'<span style="color:var(--muted)">—</span>';
    var cls=isAtr(item)?'dat':isCon(item)?'dok':'dne';
    var ico=isAtr(item)?'⚠️':isCon(item)?'✅':'📅';
    return'<span class="'+cls+'">'+ico+' '+esc(v)+'</span>';
  }
  if(col.id==='m2')return v?'<span style="font-family:\'Bebas Neue\',sans-serif;font-size:14px;color:var(--purple)">'+esc(v)+' m²</span>':'<span style="color:var(--muted)">—</span>';
  return v?esc(v):'<span style="color:var(--muted)">—</span>';
}

function togG(id){var el=document.getElementById('g-'+id);if(el)el.classList.toggle('col');}
function esc(s){var d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML;}

document.addEventListener('DOMContentLoaded',carregar);
</script>
